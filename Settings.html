<!-- THIS IS THE HEADER BAR -->
<header style="width: 1230px; height: 150px; border: 1.5px solid black; background-color: white; padding: 10px;">
    
    <h1>RUDRIES</h1>
    <p>Your Personal Assistant. Always with you sir. </p>

    <p>
        MODE:  | TIME:  | DATE:  | USER: AARUSH
    </p>

</header>

<!-- THIS IS THE NAV BAR -->
<nav class="vertical-nav"
            style="width: 200px; height: 505px; border: 1.5px solid black; background-color: white; padding: 10px;">

       <h2>NAVIGATION</h2>

        <ul>

        <ul>
            <li><a href="#">SETTINGS</a></li>  <!--SETTINGS-->
        </ul>

</nav>

<!-- THIS IS THE MAIN CONTENT AREA -->
<main>
    
<h2>SETTINGS</h2>
<form>
        

        <section>
            <h3>GENERAL</h3>

                <label for="username">User Name</label>
                    <input type="text" id="username" value="Aarush">

                <label for="language">Language</label>
                    <select id="language">
                        <option>English</option>
                    </select>

                <label for="theme">Theme</label>
                    <select id="theme">
                        <option>Light</option>
                        <option>Dark</option>
                    </select>
        </section>

        <section>
            <h3>RUDRIES</h3>

                    <label for="mode">Mode</label>
                    <select id="mode">
                        <option>Offline</option>
                        <option>Online</option>
                    </select>

                    <label for="voice">Voice-to-Text</label>
                    <select id="voice">
                    <option>Enabled</option>
                    <option>Disabled</option>
                    </select>
        </section>

        <section>   
            <h3>STORAGE</h3>

                    <label for="storage">Storage Mode</label>
                    <select id="storage">
                        <option>Local</option>
                        <option>Cloud</option>
                    </select>
                
                    <label for="data">Data Location</label>
                    <input type="text" id="data" value='Not Configured'>
        </section>
    
    <button type="submit">Save Settings</button>
    
</form>
</main>

<!-- FOOTER -->
 <footer>
        <p>
            RUDRIES v0.1.0
        </p>

        <p>

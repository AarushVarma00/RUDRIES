<!DOCTYPE html>
<html lang="en">
<head>
    
    <title>SETTINGS | RUDRIES</title>
</head>

<body>

<!-- THIS IS THE HEADER BAR -->
<header style="width: 1230px; height: 150px; border: 1.5px solid black; background-color: white; padding: 10px;">
    
    <h1>RUDRIES</h1>
    <p>Your Personal Assistant. Always with you sir. </p>

    <p>
        MODE:  | TIME:  | DATE:  | USER: AARUSH
    </p>

</header>

<!-- THIS IS THE NAV BAR -->
<nav class="vertical-nav"
            style="width: 200px; height: 505px; border: 1.5px solid black; background-color: white; padding: 10px;">

       <h2>NAVIGATION</h2>

        <ul>
            <li><a href="#">HOME</a></li>      <!--HOME-->
            <li><a href="#">NOTES</a></li>      <!--NOTES-->
            <li><a href="#">FILES</a></li>      <!--FILES-->
            <li><a href="#">CALENDAR</a></li>   <!--CALENDAR-->
            <li><a href="#">ASSISTANT</a></li>  <!--ASSISTANT-->
        </ul>

        <hr>

        <ul>
            <li><a href="#">SETTINGS</a></li>  <!--SETTINGS-->
        </ul>

</nav>

<!-- THIS IS THE MAIN CONTENT AREA -->
<main>
    
<h2>SETTINGS</h2>
<form>
        

        <fieldset>
            <legend>GENERAL</legend>

                <label for="username">User Name</label>
                   <input type="text" id="username" name="username" value="Aarush">

                <label for="language">Language</label>
                    <select id="language" name="language">
                        <option value="english">English</option>
                    </select>

                <label for="theme">Theme</label>
                    <select id="theme" name="theme">
                        <option value="light">Light</option>
                        <option value="dark">Dark</option>
                    </select>
        </fieldset>

        <fieldset>
            <legend>RUDRIES</legend>

                    <label for="mode">Mode</label>
                    <select id="mode" name="mode">
                        <option value="offline">Offline</option>
                        <option value="online">Online</option>
                    </select>

                    <label for="voice">Voice-to-Text</label>
                    <select id="voice" name="voice">
                    <option value="enabled">Enabled</option>
                    <option value="disabled">Disabled</option>
                    </select>
        </fieldset>

        <fieldset>   
            <legend>STORAGE</legend>

                    <label for="storage">Storage Mode</label>
                    <select id="storage" name="storage">
                        <option value="local">Local</option>
                        <option value="cloud">Cloud</option>
                    </select>
                
                    <label for="data">Data Location</label>
                    <input
                        type="text"
                        id="data"
                        name="data"
                        value="Not Configured"
                        readonly
                    >
        </fieldset>
    
    <button type="submit">Save Settings</button>
    
</form>
</main>

<!-- FOOTER -->
 <footer>
        <p>RUDRIES v0.1.0</p>
        <p>All systems nominal</p>
        <p>LOCAL STORAGE</p>
</footer>


  
</body>
</html>
